<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AWS Position Glossary</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e4e2d9;
    --border2: #d0cec4;
    --text: #1a1916;
    --text2: #6b6960;
    --text3: #9b9890;
    --accent: #1a1916;
    --stock-bg: #e8f0fe;
    --stock-text: #1a3a8f;
    --bond-bg: #e6f4ea;
    --bond-text: #1a5c2e;
    --alt-bg: #fef3e2;
    --alt-text: #7a4a00;
    --danger: #c0392b;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-mark svg { width: 16px; height: 16px; fill: #fff; }

  .logo-text {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text3);
    font-weight: 400;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .header-actions { display: flex; align-items: center; gap: 10px; }

  main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.1rem;
    box-shadow: var(--shadow);
  }

  .stat-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .stat-val {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .stat-val.blue { color: #1a3a8f; }
  .stat-val.green { color: #1a5c2e; }
  .stat-val.amber { color: #7a4a00; }

  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 1.25rem;
    align-items: center;
    flex-wrap: wrap;
  }

  input[type="text"], select, textarea {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.55rem 0.85rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  input[type="text"]:focus, select:focus, textarea:focus {
    border-color: var(--border2);
    box-shadow: 0 0 0 3px rgba(26,25,22,0.06);
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 15px;
    height: 15px;
    stroke: var(--text3);
    pointer-events: none;
  }

  .search-wrap input { padding-left: 2rem; }

  select { min-width: 160px; cursor: pointer; }

  button {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: 1px solid var(--accent);
    padding: 0.55rem 1rem;
  }

  .btn-primary:hover { background: #333; border-color: #333; }

  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
    padding: 0.45rem 0.75rem;
  }

  .btn-ghost:hover { background: var(--surface2); color: var(--text); }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid transparent;
    padding: 0.45rem 0.75rem;
  }

  .btn-danger:hover { background: #fdf0ee; border-color: #f5c6c2; }

  .cards { display: flex; flex-direction: column; gap: 8px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .card:hover { border-color: var(--border2); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0.9rem 1.1rem;
    cursor: pointer;
    user-select: none;
  }

  .badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .badge-stock { background: var(--stock-bg); color: var(--stock-text); }
  .badge-bond { background: var(--bond-bg); color: var(--bond-text); }
  .badge-alt { background: var(--alt-bg); color: var(--alt-text); }

  .ticker {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--text3);
    flex-shrink: 0;
    min-width: 52px;
  }

  .card-name {
    font-size: 14px;
    font-weight: 500;
    flex: 1;
    color: var(--text);
  }

  .chevron {
    width: 16px;
    height: 16px;
    stroke: var(--text3);
    flex-shrink: 0;
    transition: transform 0.2s;
  }

  .chevron.open { transform: rotate(180deg); }

  .card-body {
    display: none;
    padding: 0 1.1rem 1rem;
    border-top: 1px solid var(--border);
    margin-top: 0;
  }

  .card-body.open { display: block; }

  .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 0.9rem; }

  .card-section-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 5px;
  }

  .card-section-text {
    font-size: 13.5px;
    color: var(--text2);
    line-height: 1.65;
  }

  .card-full { grid-column: 1 / -1; }

  .holdings {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 4px;
  }

  .holding {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 3px 8px;
    border-radius: 4px;
  }

  .card-actions {
    display: flex;
    gap: 6px;
    margin-top: 0.9rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
  }

  .empty {
    text-align: center;
    padding: 3rem;
    color: var(--text3);
    font-size: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-md);
    padding: 1.75rem;
    width: 100%;
    max-width: 540px;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal h2 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 1.25rem;
    letter-spacing: -0.01em;
  }

  .form-row { margin-bottom: 0.9rem; }

  .form-row label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .form-row textarea { height: 80px; resize: vertical; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--accent);
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    padding: 0.65rem 1rem;
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-md);
    z-index: 300;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 600px) {
    header { padding: 1rem; }
    main { padding: 1rem; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .card-grid { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .logo-sub { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 16 16"><path d="M2 2h5v5H2zM9 2h5v5H9zM2 9h5v5H2zM9 9h5v5H9z"/></svg>
    </div>
    <div>
      <div class="logo-text">AWS Position Glossary</div>
      <div class="logo-sub">Investment Reference</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn-primary" onclick="openModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add position
    </button>
  </div>
</header>

<main>
  <div class="stats" id="stats"></div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="Search positions, tickers, holdings..." oninput="render()" />
    </div>
    <select id="filter" onchange="render()">
      <option value="all">All asset classes</option>
      <option value="Stocks">Stocks</option>
      <option value="Bonds">Bonds</option>
      <option value="Alternatives">Alternatives</option>
    </select>
  </div>

  <div class="cards" id="cards"></div>
</main>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">Add new position</h2>
    <div class="form-grid">
      <div class="form-row">
        <label>Position name</label>
        <input type="text" id="f-name" placeholder="e.g. iShares S&P 500" />
      </div>
      <div class="form-row">
        <label>Ticker</label>
        <input type="text" id="f-ticker" placeholder="e.g. IVV" />
      </div>
    </div>
    <div class="form-row">
      <label>Asset class</label>
      <select id="f-class">
        <option value="Stocks">Stocks</option>
        <option value="Bonds">Bonds</option>
        <option value="Alternatives">Alternatives</option>
      </select>
    </div>
    <div class="form-row">
      <label>What it is</label>
      <textarea id="f-what" placeholder="Brief description of the fund or position..."></textarea>
    </div>
    <div class="form-row">
      <label>Why we own it</label>
      <textarea id="f-why" placeholder="Investment rationale..."></textarea>
    </div>
    <div class="form-row">
      <label>Where we own it</label>
      <input type="text" id="f-where" placeholder="e.g. Across all Asset Allocation strategies" />
    </div>
    <div class="form-row">
      <label>Largest holdings (comma separated)</label>
      <input type="text" id="f-holdings" placeholder="e.g. AAPL (7.34%), MSFT (7.24%)" />
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="savePosition()">Save position</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

let positions = [];
let editId = null;
let nextId = 100;

function loadPositions() {
  try {
    const stored = localStorage.getItem(POSITIONS_KEY);
    if (stored) {
      positions = JSON.parse(stored);
      nextId = Math.max(...positions.map(p => p.id || 0), 99) + 1;
    } else {
      positions = SEED.map(p => ({...p}));
      savePositions();
    }
  } catch(e) {
    positions = SEED.map(p => ({...p}));
  }
}

function savePositions() {
  try { localStorage.setItem(POSITIONS_KEY, JSON.stringify(positions)); } catch(e) {}
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function badgeCls(cls) {
  if (cls === 'Stocks') return 'badge-stock';
  if (cls === 'Bonds') return 'badge-bond';
  return 'badge-alt';
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const f = document.getElementById('filter').value;

  const filtered = positions.filter(p => {
    const matchCls = f === 'all' || p.cls === f;
    const search = [p.name, p.ticker, p.what, p.why, p.where, ...(p.holdings||[])].join(' ').toLowerCase();
    const matchQ = !q || search.includes(q);
    return matchCls && matchQ;
  });

  const stocks = positions.filter(p => p.cls === 'Stocks').length;
  const bonds = positions.filter(p => p.cls === 'Bonds').length;
  const alts = positions.filter(p => p.cls === 'Alternatives').length;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Total positions</div><div class="stat-val">${positions.length}</div></div>
    <div class="stat"><div class="stat-label">Stocks</div><div class="stat-val blue">${stocks}</div></div>
    <div class="stat"><div class="stat-label">Bonds</div><div class="stat-val green">${bonds}</div></div>
    <div class="stat"><div class="stat-label">Alternatives</div><div class="stat-val amber">${alts}</div></div>
  `;

  const container = document.getElementById('cards');

  if (!filtered.length) {
    container.innerHTML = '<div class="empty">No positions match your search.</div>';
    return;
  }

  container.innerHTML = filtered.map(p => `
    <div class="card" id="card-${p.id}">
      <div class="card-header" onclick="toggle(${p.id})">
        <span class="badge ${badgeCls(p.cls)}">${p.cls}</span>
        <span class="ticker">${p.ticker}</span>
        <span class="card-name">${p.name}</span>
        <svg class="chevron" id="chev-${p.id}" viewBox="0 0 24 24" fill="none" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="card-body" id="body-${p.id}">
        <div class="card-grid">
          ${p.what ? `<div class="card-section card-full"><div class="card-section-label">What it is</div><div class="card-section-text">${p.what}</div></div>` : ''}
          ${p.why ? `<div class="card-section card-full"><div class="card-section-label">Why we own it</div><div class="card-section-text">${p.why}</div></div>` : ''}
          ${p.where ? `<div class="card-section card-full"><div class="card-section-label">Where we own it</div><div class="card-section-text">${p.where}</div></div>` : ''}
          ${p.holdings && p.holdings.length ? `
            <div class="card-section card-full">
              <div class="card-section-label">Largest holdings</div>
              <div class="holdings">${p.holdings.map(h => `<span class="holding">${h}</span>`).join('')}</div>
            </div>` : ''}
        </div>
        <div class="card-actions">
          <button class="btn-ghost" onclick="openModal(${p.id})">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Edit
          </button>
          <button class="btn-danger" onclick="deletePos(${p.id})">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            Delete
          </button>
        </div>
      </div>
    </div>
  `).join('');
}

function toggle(id) {
  const body = document.getElementById('body-' + id);
  const chev = document.getElementById('chev-' + id);
  const open = body.classList.toggle('open');
  if (open) chev.classList.add('open');
  else chev.classList.remove('open');
}

function openModal(id) {
  editId = (id !== undefined) ? id : null;
  const p = editId !== null ? positions.find(x => x.id === editId) : {};
  document.getElementById('modal-title').textContent = editId !== null ? 'Edit position' : 'Add new position';
  document.getElementById('f-name').value = p && p.name ? p.name : '';
  document.getElementById('f-ticker').value = p && p.ticker ? p.ticker : '';
  document.getElementById('f-class').value = p && p.cls ? p.cls : 'Stocks';
  document.getElementById('f-what').value = p && p.what ? p.what : '';
  document.getElementById('f-why').value = p && p.why ? p.why : '';
  document.getElementById('f-where').value = p && p.where ? p.where : '';
  document.getElementById('f-holdings').value = p && p.holdings ? p.holdings.join(', ') : '';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 50);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editId = null;
}

function savePosition() {
  const name = document.getElementById('f-name').value.trim();
  const ticker = document.getElementById('f-ticker').value.trim().toUpperCase();
  if (!name) { alert('Position name is required.'); return; }
  if (!ticker) { alert('Ticker is required.'); return; }

  const p = {
    id: editId !== null ? editId : nextId++,
    name,
    ticker,
    cls: document.getElementById('f-class').value,
    what: document.getElementById('f-what').value.trim(),
    why: document.getElementById('f-why').value.trim(),
    where: document.getElementById('f-where').value.trim(),
    holdings: document.getElementById('f-holdings').value.split(',').map(s => s.trim()).filter(Boolean)
  };

  if (editId !== null) {
    const idx = positions.findIndex(x => x.id === editId);
    if (idx > -1) positions[idx] = p;
  } else {
    positions.push(p);
  }

  savePositions();
  closeModal();
  render();
  showToast(editId !== null ? 'Position updated.' : 'Position added.');
}

function deletePos(id) {
  const p = positions.find(x => x.id === id);
  if (!p) return;
  if (!confirm('Delete ' + p.name + '?')) return;
  positions = positions.filter(x => x.id !== id);
  savePositions();
  render();
  showToast('Position deleted.');
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.getElementById('search').addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { this.value = ''; render(); }
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

loadPositions();
render();
</script>
